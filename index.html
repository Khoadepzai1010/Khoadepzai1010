<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Học sinh</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-user-graduate"></i> Quản lý Học sinh</h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm học sinh...">
            </div>
        </header>

        <main>
            <div class="action-bar">
                <button id="openModalBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Thêm học sinh mới
                </button>
                <div class="stats">
                    Tổng số: <span id="studentCount">0</span>
                </div>
            </div>

            <div class="table-container">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th>Mã HS</th>
                            <th>Họ và Tên</th>
                            <th>Ngày sinh</th>
                            <th>Lớp</th>
                            <th>Email</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <!-- Dữ liệu sẽ hiển thị ở đây -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Học sinh -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm học sinh mới</h2>
                <span class="close">&times;</span>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <div class="form-group">
                    <label for="fullName">Họ và Tên</label>
                    <input type="text" id="fullName" required placeholder="Nguyễn Văn A">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="dob">Ngày sinh</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="className">Lớp</label>
                        <input type="text" id="className" required placeholder="6A1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="hocsinh@school.edu.vn">
                </div>
                <button type="submit" class="btn btn-success btn-block">Lưu thông tin</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
